services:
  - type: web
    name: shivaai-backend
    runtime: docker
    dockerfilePath: ./shivaai_backend/Dockerfile
    dockerContext: ./shivaai_backend
    plan: free
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
